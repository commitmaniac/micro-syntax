filetype: ninja

detect:
  filename: "\\.ninja$"

rules:
  - statement: "^(build|default|include|rule|subninja)"
  - statement: "^[[:space:]]+(command|depfile|deps|description)"
  - statement: "^[[:space:]]+(depth|dyndep|generator|msvc_deps_prefix)"
  - statement: "^[[:space:]]+(in_newline|pool|restat|rspfile(_content)?)"

  # Variables
  - identifier: "\\$\\{?[A-Za-z0-9_-]+\\}?"
  - symbol.operator: "\\=|[[:space:]]\\$$|\\:|\\|"

  - constant.string:
      start: "\""
      end: "\""
      rules: []

  # Ninja doesn't support inline comments
  - comment.line:
      start: "^#"
      end: "$"
      rules: []
